services:
  - type: web
    name: imdc-web
    runtime: node
    region: oregon
    buildCommand: |
      cd artifacts/imdc && npm install --no-save && npm run build
    startCommand: cd artifacts/imdc && npm run serve
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "24"
