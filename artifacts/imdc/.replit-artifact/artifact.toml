kind = "web"
previewPath = "/"
title = "IMDC — Medical Billing"
version = "1.0.0"
id = "artifacts/imdc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22322

[services.development]
run = "pnpm --filter @workspace/imdc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/imdc", "run", "build" ]
publicDir = "artifacts/imdc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22322"
BASE_PATH = "/"
